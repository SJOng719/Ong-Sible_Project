<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todoist Daily Planner</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #d6d6ff;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    background: rgb(249, 238, 249);
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 450px;
}

h2 {
    color: #f194da;
    border-bottom: 2px solid #eee;
    padding-bottom: 10px;
    text-align: center;
    font-family: monospace;
}

.step { display:none; }
.step.active { display:block; }

label {
    display:block;
    margin-top:10px;
    font-weight:bold;
}

input, select {
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ddd;
    border-radius:5px;
    box-sizing: border-box;
}

button {
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
}

.btn-next { background:#772da8; color:white; }
.btn-add { background:#7794b4; color:white; }

.item {
    background:#fff;
    padding:12px;
    margin-top:10px;
    border-radius:6px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.actions button {
    width:auto;
    padding:6px 10px;
    background:#e74c3c;
    color:white;
    font-size:12px;
}

.summary-title {
    text-align:center;
}

.summary-box {
    background:#fdfdfd;
    border:1px dashed #ccc;
    padding:15px;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">
<h2>----== TODOIST DAILY PLANNER ==----</h2>


<div id="step1" class="step active">
    <label>Starting date:</label>
    <input type="date" id="startDate">

    <label>Your Name:</label>
    <input type="text" id="userName" placeholder="Enter your name">

    <button class="btn-next" onclick="goToStep(2)">Next</button>
</div>


<div id="step2" class="step">
    <h3 id="greeting"></h3>

    <p>How are you feeling today?</p>
    <select id="moodRating">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3" selected>3</option>
        <option value="4">4</option>
        <option value="5">5</option>
    </select>

    <button class="btn-next" onclick="goToStep(3)">Next</button>
</div>


<div id="step3" class="step">
    <h3>Events</h3>
    <div id="eventList"></div>

    <input id="evName" placeholder="Event name">
    <input id="evDate" type="date">
    <input id="evTime" type="time">

    <button class="btn-add" onclick="addEvent()">Add Event</button>
    <button class="btn-next" onclick="goToStep(4)">Next</button>
</div>


<div id="step4" class="step">
    <h3>Tasks</h3>
    <div id="taskList"></div>

    <input id="taskName" placeholder="Task name">
    <input id="taskTime" placeholder="Minutes">

    <button class="btn-add" onclick="addTask()">Add Task</button>
    <button class="btn-next" onclick="showSummary()">Show Summary</button>
</div>


<div id="step5" class="step">
    <h3 class="summary-title">----== DAILY SUMMARY ==----</h3>

    <div class="summary-box" id="summary"></div>

    <button class="btn-next" onclick="goToStep(3)">Back to Planner</button>
    <button class="btn-add" onclick="resetPlanner()">Reset Planner</button>
</div>

</div>

<script>
if("Notification" in window){
    Notification.requestPermission();
}

const KEY="planner_data";
let timers={};

let data={
    name:"",
    date:"",
    mood:3,
    events:[],
    tasks:[]
};


function save(){
    localStorage.setItem(KEY,JSON.stringify(data));
}


function load(){
    const s=localStorage.getItem(KEY);
    if(s){
        data=JSON.parse(s);
        renderAll();
        scheduleAll();
    }
}


function triggerAlarm(text){
    if(Notification.permission==="granted"){
        new Notification("Reminder",{body:text});
    }

    try{
        const ctx=new (window.AudioContext||window.webkitAudioContext)();
        const osc=ctx.createOscillator();
        osc.frequency.value=1000;
        osc.connect(ctx.destination);
        osc.start();
        setTimeout(()=>osc.stop(),500);
    }catch(e){}

    alert(text);
}


function scheduleEvent(e,i){
    const time=new Date(`${e.date}T${e.time}`);
    const delay=time-new Date();
    if(delay<=0) return;

    clearTimeout(timers["e"+i]);
    timers["e"+i]=setTimeout(()=>triggerAlarm("Event: "+e.name),delay);
}


function scheduleTask(t,i){
    const delay=t.time*60000;
    clearTimeout(timers["t"+i]);
    timers["t"+i]=setTimeout(()=>triggerAlarm("Task done: "+t.name),delay);
}


function scheduleAll(){
    data.events.forEach((e,i)=>scheduleEvent(e,i));
    data.tasks.forEach((t,i)=>scheduleTask(t,i));
}


function goToStep(n){

    if(n===2){
        const name=userName.value.trim();
        const date=startDate.value;

        if(!name || !date){
            alert("Please enter name and starting date.");
            return;
        }

        data.name=name;
        data.date=date;

        greeting.innerText=`Good day, ${data.name}!`;
    }

    document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
    document.getElementById("step"+n).classList.add("active");

    save();
}


function addEvent(){
    const name=evName.value.trim();
    const date=evDate.value;
    const time=evTime.value;

    if(!name||!date||!time) return alert("Fill all inputs needed.");

    data.events.push({name,date,time});

    evName.value="";
    evDate.value="";
    evTime.value="";

    renderEvents();
    scheduleAll();
    save();
}


function addTask(){
    const name=taskName.value.trim();
    const time=parseInt(taskTime.value);

    if(!name||isNaN(time)) return alert("Invalid task");

    data.tasks.push({name,time});

    taskName.value="";
    taskTime.value="";

    renderTasks();
    scheduleAll();
    save();
}


function renderEvents(){
    eventList.innerHTML="";
    data.events.forEach((e,i)=>{
        const div=document.createElement("div");
        div.className="item";
        div.innerHTML=`
            <span>${e.name} - ${e.date} @ ${e.time}</span>
            <div class="actions">
                <button onclick="deleteEvent(${i})">Delete</button>
            </div>
        `;
        eventList.appendChild(div);
    });
}


function renderTasks(){
    taskList.innerHTML="";
    data.tasks.forEach((t,i)=>{
        const div=document.createElement("div");
        div.className="item";
        div.innerHTML=`
            <span>${t.name} (${t.time} min)</span>
            <div class="actions">
                <button onclick="deleteTask(${i})">Delete</button>
            </div>
        `;
        taskList.appendChild(div);
    });
}


function deleteEvent(i){
    data.events.splice(i,1);
    renderEvents();
    scheduleAll();
    save();
}

function deleteTask(i){
    data.tasks.splice(i,1);
    renderTasks();
    scheduleAll();
    save();
}


function showSummary(){
    data.mood=moodRating.value;

    const events=data.events.length
        ? data.events.map(e=>`<li>${e.name} (${e.date} ${e.time})</li>`).join("")
        : "<li>No events</li>";

    const tasks=data.tasks.length
        ? data.tasks.map(t=>`<li>${t.name} (${t.time} min)</li>`).join("")
        : "<li>No tasks</li>";

    summary.innerHTML=`
    <p><b>Date:</b> ${data.date}</p>
    <p><b>User:</b> ${data.name}</p>
    <p><b>Mood Rating:</b> ${data.mood}/5</p>

    <p><b>Events:</b></p>
    <ul>${events}</ul>

    <p><b>Tasks:</b></p>
    <ul>${tasks}</ul>

    <br>

    <p style="font-weight:bold; font-size:16px;">
        Have a productive day, ${data.name}!
    </p>

    <p style="text-align:center; color:#555; font-style:italic; margin-top:15px;">
        Reminder: Stay positive and keep track of your goals!
    </p>
`;

    goToStep(5);
    save();
}


function resetPlanner(){
    if(!confirm("Reset everything?")) return;

    localStorage.removeItem(KEY);
    data={name:"",date:"",mood:3,events:[],tasks:[]};

    Object.values(timers).forEach(clearTimeout);
    timers={};

    renderAll();
    goToStep(1);
}


function renderAll(){
    userName.value=data.name;
    startDate.value=data.date;
    moodRating.value=data.mood;
    renderEvents();
    renderTasks();
}

load();
</script>

</body>
</html>
